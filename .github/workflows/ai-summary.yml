name: Generate AI Summary

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  ai-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Obter ficheiros
        uses: actions/checkout@v4

      - name: Gerar analise AI
        env:
          OPENAI_API_KEY: ${{ secrets.API_CHATGPT || secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: node scripts/generate-ai-summary.mjs

      - name: Preparar publicacao
        run: |
          mkdir -p public
          cp index.html public/index.html
          cp ai-summary.json public/ai-summary.json

      - name: Publicar no Neocities
        uses: bcomnes/deploy-to-neocities@v3
        with:
          api_key: ${{ secrets.NEOCITIES_API_KEY || secrets.NEOCITIES_API_TOKEN }}
          cleanup: false
          neocities_supporter: false
          preview_before_deploy: true
          dist_dir: public
