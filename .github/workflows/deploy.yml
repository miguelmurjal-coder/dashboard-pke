name: Deploy Dashboard PKE

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Obter ficheiros
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Atualizar estatisticas MailerLite
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY || secrets.API_MAILERLITE || secrets.MAILERLITE_API || secrets.API_MAILERLITE_KEY }}
        run: node scripts/fetch-mailerlite-stats.mjs

      - name: Atualizar PKE Call Analytics
        env:
          CALL_ANALYTICS_BASE_URL: ${{ secrets.CALL_ANALYTICS_BASE_URL }}
        run: node scripts/fetch-call-analytics.mjs

      - name: Preparar publicacao
        run: |
          mkdir -p public
          cp index.html public/index.html
          cp -R assets public/assets

      - name: Publicar no Neocities
        uses: bcomnes/deploy-to-neocities@v3
        with:
          api_key: ${{ secrets.NEOCITIES_API_KEY || secrets.NEOCITIES_API_TOKEN }}
          cleanup: false
          neocities_supporter: false
          preview_before_deploy: true
          dist_dir: public
