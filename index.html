.funnel-step {

}
.funnel-step:hover { transform: translateY(-1px); border-color: #3f6790; }
.funnel-step::after {
  content: "";

  top: 50%;

  width: 0.75rem;
  height: 1px;
  background: #2d4566;
}

    return `<!DOCTYPE html><html lang="pt-PT"><head><meta charset="utf-8"><title>${escapeHtml(report.title)}</title><style>

    </style></head><body>
      <section class="page cover"><main><div class="eyebrow">PKE · Marketing Control Panel</div><h1>${escapeHtml(report.title)}</h1><p class="subtitle">${escapeHtml(report.subtitle)}</p><div class="kpis">${report.kpis.map((k) => `<div class="kpi"><span>${escapeHtml(k.label)}</span><b>${escapeHtml(k.value)}</b><small>${escapeHtml(k.detail)}</small></div>`).join("")}</div><div class="callout ${report.healthTone}"><strong>Leitura executiva:</strong><br>${escapeHtml(report.executiveRead)}</div>${reportBullets(report.actions)}</main><footer>${footer}</footer></section>
      ${page("1. Volume e fontes - de onde vêm os leads", `${reportNarrative("Como ler esta página", "Esta página mostra se o crescimento vem de mais volume real ou apenas de uma fonte isolada. O gráfico semanal ajuda a perceber ritmo; o ranking de origens mostra onde está concentrada a procura.")}${reportStackedBars(report.weekRows, report.weekSources)}<div class="grid2"><div><h3>Top origens por volume</h3>${reportBarChart(report.sourceRows.map((r) => ({label:r.label,value:r.total})), "number", "#2F6FB2")}</div><div><h3>Top origens por valor</h3>${reportBarChart(report.sourceRows.map((r) => ({label:r.label,value:r.value})), "currency", "#42A585")}</div></div>${reportTable(["Origem", "Total", "BO", "VSP", "Valor"], sourceRows)}<h3>Leituras principais</h3>${reportBullets(report.volumeInsights)}`)}

      ${page("3. Auditoria de tracking (UTM)", `${reportNarrative("Como ler esta página", "UTMs são as etiquetas que dizem de onde veio cada lead. Sem UTMs consistentes, conseguimos contar leads, mas perdemos confiança para decidir que campanha merece orçamento.")}<div class="donut-row">${report.donutMetrics.map((item) => reportDonutChart(item.value, item.label, item.detail, item.color)).join("")}</div>${reportTable(["Problema", "Dimensão", "Correção"], report.utmAuditRows)}<h3>Convenção recomendada</h3>${reportTable(["Parâmetro", "Valores/Regra", "Exemplo"], report.utmRules)}`)}

  function generateDashboardReport(data) {
    const w = window.open("", "_blank");
    if (!w) {
      alert("O browser bloqueou a janela do relatório. Permite pop-ups para este site e tenta novamente.");
      return;
    }
    w.document.open();
    w.document.write(buildReportHtml(data));
    w.document.close();
  }
  function readablePeriodLabel(selectedMonths) {
    return periodFilterLabel(selectedMonths).replace("Ano completo", "ano completo");
  }
  function buildDashboardReportData({ model, vspTable, boTable, boOrdersTable, selectedMonths }) {
    const revObjTotal = sumByMonths(model.revenue.objetivo && model.revenue.objetivo.monthly, selectedMonths);
    const revRealTotal = sumByMonths(model.revenue.real && model.revenue.real.monthly, selectedMonths);
    const pctAtingido = revObjTotal ? revRealTotal / revObjTotal : 0;
    const boRecords = boTotalRecords(boTable, selectedMonths);
    const vspRecords = vspTotalRecords(vspTable, selectedMonths);
    const records = [...boRecords, ...vspRecords];
    const vspRows = (vspTable && vspTable.rows || []).filter((row) => {
      const d = parseRowDate(row, VSP_DATE_COL);
      return d && selectedMonths.has(d.getMonth());
    });
    const boRecordRows = boRecords;
    const scorecardRows = scorecardCompletionRows(vspRows);
    const vspConversion = buildVspToOrderConversion(vspTable, boOrdersTable, selectedMonths);
    const globalFunnel = buildGlobalValueFunnel({ boRecords, vspRecords, ordersTable: boOrdersTable, selectedMonths, vspConversion });
    const diagnosis = buildExecutiveDiagnosis({ model, selectedMonths, pctAtingido, alertThreshold: 80, vspTable });
    const sourceRows = totalGroupStats(records, totalRecordSourceLabel, 10, 1);
    const brandRows = totalGroupStats(records, (record) => record.brand || "Sem marca", 10, 1);
    const campaignRows = totalGroupStats(records, (record) => record.campaign || "Sem campanha", 10, 1);
    const landingRows = groupedLeadStats(vspRows, (row) => landingPageLabel(textValue(row, VSP_LANDING_COL)), 10);
    const severityRows = groupCount(scorecardRows, (row) => {
      const value = numericValue(row, VSP_SEVERITY_COL);
      return value ? `Gravidade ${fmtNumber(value)}` : "Sem gravidade";
    }, 6).filter((row) => row.label !== "Sem gravidade");
    const urgencyRows = groupCount(scorecardRows, (row) => {
      const value = numericValue(row, VSP_URGENCY_COL);
      return value ? `Urgência ${fmtNumber(value)}` : "Sem urgência";
    }, 6).filter((row) => row.label !== "Sem urgência");
    const hotZoneAllRows = scorecardRows.filter((row) => numericValue(row, VSP_SEVERITY_COL) >= 4 && numericValue(row, VSP_URGENCY_COL) >= 3).sort((a, b) => leadPriorityScore(b) - leadPriorityScore(a));
    const scoreMatrixMap = new Map();
    scorecardRows.forEach((row) => {
      const rawSeverity = Math.round(numericValue(row, VSP_SEVERITY_COL) || 0);
      const rawUrgency = Math.round(numericValue(row, VSP_URGENCY_COL) || 0);
      if (!rawSeverity || !rawUrgency) return;
      const severity = Math.max(1, Math.min(5, rawSeverity));
      const urgency = Math.max(1, Math.min(5, rawUrgency));
      const key = `${severity}-${urgency}`;
      scoreMatrixMap.set(key, (scoreMatrixMap.get(key) || 0) + 1);
    });
    const scoreMatrixRows = Array.from(scoreMatrixMap, ([key, count]) => {
      const [severity, urgency] = key.split("-").map(Number);
      return { severity, urgency, count };
    });
    const priorityRows = [
      { label: "Quente", value: hotZoneAllRows.length },
      { label: "Morna", value: scorecardRows.filter((row) => {
        const severity = numericValue(row, VSP_SEVERITY_COL);
        const urgency = numericValue(row, VSP_URGENCY_COL);
        return !(severity >= 4 && urgency >= 3) && (severity >= 3 || urgency >= 2);
      }).length },
      { label: "Fria/baixa urgência", value: scorecardRows.filter((row) => {
        const severity = numericValue(row, VSP_SEVERITY_COL);
        const urgency = numericValue(row, VSP_URGENCY_COL);
        return severity < 3 && urgency < 2;
      }).length }
    ];
    const weekRows = reportWeeklySourceRows(vspRows, boRecordRows);
    const preferredSources = ["Meta Ads", "Google Ads", "Email/newsletter", "Direto/Website", "BackOffice", "Scorecard", "VSP", "Sem origem"];
    const weekSourceSet = new Set();
    weekRows.forEach((row) => Object.keys(row).forEach((key) => {
      if (!["label", "total", "sort"].includes(key)) weekSourceSet.add(key);
    }));
    const weekSources = Array.from(weekSourceSet).sort((a, b) => {
      const ia = preferredSources.indexOf(a);
      const ib = preferredSources.indexOf(b);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib) || a.localeCompare(b, "pt-PT");
    }).slice(0, 5);
    const coreUtmComplete = records.length ? records.filter((record) => record.hasCoreUtm).length / records.length : 0;
    const anyUtmComplete = records.length ? records.filter((record) => record.hasUtm).length / records.length : 0;
    const suspiciousCampaigns = campaignRows.filter((row) => /^\d{6,}$/.test(normalizeSearchText(row.label).replace(/\D/g, "")) || /\{\{|id|campaign id/i.test(row.label));
    const topSource = sourceRows[0];
    const topBrand = brandRows[0];
    const topLanding = landingRows[0];
    const topCampaign = campaignRows[0];
    const uniqueBrands = new Set(records.map((record) => normalizeSearchText(record.brand || "")).filter(Boolean)).size;
    const uniqueLandings = new Set(landingRows.map((row) => normalizeSearchText(row.label || "")).filter(Boolean)).size;
    const title = "Relatório Executivo Marketing Control Panel";
    const generatedAt = new Date().toLocaleDateString("pt-PT");
    const periodLabel = readablePeriodLabel(selectedMonths);
    const healthTone = pctAtingido >= 1 ? "good" : pctAtingido >= 0.7 ? "warn" : "";
    const executiveRead = `No período ${periodLabel}, a faturação está em ${fmtPercent(pctAtingido)} do objetivo (${fmtCurrency(revRealTotal)} de ${fmtCurrency(revObjTotal)}). O funil MKT junta ${fmtNumber(globalFunnel.entries)} entradas, ${fmtNumber(globalFunnel.proposals)} propostas BO e ${fmtNumber(globalFunnel.orders)} encomendas BO. As VSP entram como leads paralelos sem proposta BO inicial.`;
    const actionItems = [
      ...globalFunnel.actions,
      ...diagnosis.actions
    ].filter(Boolean).filter((item, index, arr) => arr.indexOf(item) === index);
    while (actionItems.length < 5) {
      actionItems.push("Rever semanalmente fontes, campanhas e páginas com maior volume antes de ajustar investimento.");
    }
    const utmMissing = records.filter((record) => !record.hasCoreUtm).length;
    const funnelInsights = [
      `O valor proposto no BO é ${fmtCurrency(globalFunnel.proposedValue)} e o valor encomendado BO é ${fmtCurrency(globalFunnel.orderedValue)}.`,
      `O valor ainda em aberto nas propostas BO é ${fmtCurrency(globalFunnel.openProposalValue)}.`,
      `A conversão de proposta BO para encomenda está em ${fmtPercent(globalFunnel.proposalToOrderRate)}.`,
      `O cruzamento VSP com o BackOffice encontrou ${fmtNumber(vspConversion.converted)} encomendas identificadas em ${fmtNumber(vspConversion.leads)} leads VSP.`
    ];
    const volumeInsights = [
      `${fmtNumber(globalFunnel.entries)} entradas no período: ${fmtNumber(globalFunnel.vspLeads)} vindas de VSP/FAP e ${fmtNumber(globalFunnel.proposals)} vindas do BackOffice.`,
      topSource ? `${topSource.label} é a origem com maior volume: ${fmtNumber(topSource.total)} registos e ${fmtCurrency(topSource.value)} em valor associado.` : "Sem origem dominante no período selecionado.",
      topCampaign ? `${topCampaign.label} é a campanha com maior volume: ${fmtNumber(topCampaign.total)} registos.` : "Sem campanhas suficientes para análise.",
      `UTMs principais completos em ${fmtPercent(coreUtmComplete)} dos registos, o que define a confiança da leitura por campanha.`
    ];
    const scoreInsights = [
      `${fmtNumber(scorecardRows.length)} leads VSP/FAP têm scorecard ou sinais de qualificação.`,
      `${fmtNumber(hotZoneAllRows.length)} leads estão na zona quente, ou seja, combinam gravidade elevada com urgência elevada.`,
      hotZoneAllRows.length ? "A zona quente deve ser tratada como fila prioritária de contacto comercial." : "Sem zona quente visível no período selecionado.",
      "A análise de gravidade e urgência ajuda a separar leads de curiosidade de leads com maior probabilidade de compra."
    ];
    const brandInsights = [
      topBrand ? `${topBrand.label} lidera a procura por marca com ${fmtNumber(topBrand.total)} registos.` : "Sem marcas suficientes para ranking.",
      topLanding ? `${topLanding.label} é a landing page com maior volume VSP: ${fmtNumber(topLanding.leads)} leads.` : "Sem landing pages suficientes para ranking.",
      "Marcas e páginas com muito volume mas pouca conversão devem ser revistas por mensagem, oferta e qualidade da lead."
    ];
    return {
      title,
      subtitle: `${periodLabel} · gerado a ${generatedAt}`,
      generatedAt,
      healthTone,
      executiveRead,
      kpis: [
        { label: "Faturação vs objetivo", value: fmtPercent(pctAtingido), detail: `${fmtCurrency(revRealTotal)} / ${fmtCurrency(revObjTotal)}` },
        { label: "Entradas", value: fmtNumber(globalFunnel.entries), detail: `${fmtNumber(globalFunnel.vspLeads)} VSP + ${fmtNumber(globalFunnel.proposals)} BO` },
        { label: "Valor capturado", value: fmtPercent(globalFunnel.valueCaptureRate), detail: `${fmtCurrency(globalFunnel.orderedValue)} encomendado BO` },
        { label: "VSP para Encomenda", value: fmtPercent(vspConversion.leads ? vspConversion.converted / vspConversion.leads : 0), detail: `${fmtNumber(vspConversion.converted)} encomendas identificadas` }
      ],
      actions: actionItems.slice(0, 5),
      sourceRows,
      brandRows,
      campaignRows,
      landingRows,
      weekRows,
      weekSources,
      severityRows,
      urgencyRows,
      scoreMatrixRows,
      priorityRows,
      hotZoneTotal: hotZoneAllRows.length,
      hotZoneRows: hotZoneAllRows.slice(0, 8),
      volumeInsights,
      scoreInsights,
      donutMetrics: [
        { label: "UTMs completos", value: coreUtmComplete, detail: "Registos com source, medium, campaign e content.", color: "#42A585" },
        { label: "Algum tracking", value: anyUtmComplete, detail: "Registos onde pelo menos uma etiqueta UTM existe.", color: "#2F6FB2" },
        { label: "Sem correção pendente", value: records.length ? 1 - utmMissing / records.length : 1, detail: "Quanto mais alto, menos registos precisam de limpeza.", color: "#C99A4E" }
      ],
      utmAuditRows: [
        ["UTMs principais incompletos", `${fmtNumber(utmMissing)} registos`, "Preencher utm_source, utm_medium, utm_campaign e utm_content em todas as campanhas."],
        ["Campanhas por ID ou macro", `${fmtNumber(suspiciousCampaigns.length)} campanhas no ranking`, "Usar nomes legíveis nos URLs e validar macros antes de lançar campanhas."],
        ["Cobertura de tracking", `${fmtPercent(anyUtmComplete)} com algum UTM; ${fmtPercent(coreUtmComplete)} completos`, "Adotar a mesma convenção em Meta, Google, MailerLite e tráfego orgânico."]
      ],
      utmRules: [
        ["utm_source", "meta · google · mailerlite · organic · referral", "meta"],
        ["utm_medium", "paid_social · cpc · email · organic · referral", "paid_social"],
        ["utm_campaign", "servico_objetivo_aaaamm", "fap_leads_202607"],
        ["utm_content", "criativo_conjunto_anuncio", "video01_cta"]
      ],
      funnelKpis: [
        { label: "Propostas BO", value: fmtNumber(globalFunnel.proposals), detail: `${fmtPercent(globalFunnel.leadToProposalRate)} das entradas` },
        { label: "Encomendas BO", value: fmtNumber(globalFunnel.orders), detail: `${fmtPercent(globalFunnel.proposalToOrderRate)} das propostas` },
        { label: "Valor proposto", value: fmtCurrency(globalFunnel.proposedValue), detail: "Propostas BO" },
        { label: "Valor em aberto", value: fmtCurrency(globalFunnel.openProposalValue), detail: "Sem encomenda identificada" }
      ],
      funnelSteps: [
        { label: "Entradas", value: globalFunnel.entries, detail: "VSP + BO", color: "#2F6FB2" },
        { label: "Propostas BO", value: globalFunnel.proposals, detail: `${fmtPercent(globalFunnel.leadToProposalRate)} das entradas`, color: "#42A585" },
        { label: "Encomendas", value: globalFunnel.orders, detail: `${fmtPercent(globalFunnel.proposalToOrderRate)} das propostas`, color: "#C99A4E" },
        { label: "VSP convertidas", value: vspConversion.converted, detail: "Encontradas no BackOffice", color: "#6B7280" }
