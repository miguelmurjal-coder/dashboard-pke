  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  padding: 0.58rem 0.7rem;
  border-radius: 0.8rem;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  font-size: 0.78rem;
}
.task-review-label { color: #475569; font-weight: 800; }
.task-review-value { color: #0f172a; font-weight: 950; }
.task-week-mini { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.4rem; margin-top: 0.75rem; }
.task-week-day { border-radius: 0.8rem; border: 1px solid #e2e8f0; background: #f8fafc; padding: 0.55rem 0.45rem; text-align: center; }
.task-week-day-name { color: #64748b; font-size: 0.68rem; font-weight: 900; }
.task-week-day-value { color: #0f172a; font-size: 0.82rem; font-weight: 950; margin-top: 0.1rem; }
.task-action-stack { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }


.task-log-command-card {
  padding: 1.1rem 1.15rem;
  border: 1px solid #233048;
  border-radius: 1.15rem;
  background: linear-gradient(135deg, #121c31 0%, #0f1726 100%);
  box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
}
.task-command-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  margin-bottom: 1.1rem;
}
.task-updated-label {
  color: #99acc9;
  font-size: 0.78rem;
  font-weight: 750;
}
.task-refresh-btn {
  color: #7dd3fc;
  font-size: 0.78rem;
  font-weight: 950;
  border-radius: 9999px;
  padding: 0.45rem 0.7rem;
}
.task-refresh-btn:hover { background: rgba(125,211,252,0.09); color: #bae6fd; }
.task-command-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.task-command-title {
  color: #f8fafc;
  font-size: 1.25rem;
  font-weight: 950;
}
.task-command-description {
  color: #99acc9;
  font-size: 0.82rem;
  font-weight: 700;
  margin-top: 0.45rem;
}
.task-command-nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  margin: 1.1rem 0 0.9rem;
}
.task-command-date {
  color: #f8fafc;
  font-size: 0.92rem;
  font-weight: 950;
}
.task-log-command-card .task-day-nav { background: rgba(15,23,38,0.35); border-color: #2a3a56; }
.task-log-command-card .task-day-nav button { color: #c7d3e6; }
.task-log-command-card .task-day-nav button:hover { color: #ffffff; background: rgba(125,211,252,0.08); }
.task-log-command-card .task-focus-hero {
  padding: 1rem 0 0;
  border: 0;
  border-top: 1px solid #233048;
  border-radius: 0;
  background: transparent;
}
.task-log-command-card .task-focus-progress { margin-top: 0.1rem; }

/* Log V3 — Focus Mode */
.task-focus-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  gap: 1rem;
  align-items: center;
  padding: 1rem;
  border: 1px solid #233048;
  border-radius: 1rem;
  background: linear-gradient(135deg, #131c30 0%, #0f1726 100%);
  position: relative;
  overflow: hidden;
}
.task-focus-heading { color: #f8fafc; font-size: 1.15rem; font-weight: 950; margin-top: 0.1rem; }
.task-focus-subline { color: #99acc9; font-size: 0.78rem; font-weight: 750; margin-top: 0.25rem; }
.task-focus-metrics { display: flex; gap: 0.55rem; flex-wrap: wrap; }
.task-focus-metric { min-width: 6.25rem; padding: 0.55rem 0.7rem; border-radius: 0.85rem; border: 1px solid #2a3a56; background: rgba(15,23,38,0.72); }
.task-focus-metric span { display: block; color: #7f93b3; font-size: 0.66rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em; }
.task-focus-metric strong { display: block; color: #f8fafc; font-size: 0.95rem; font-weight: 950; margin-top: 0.12rem; }
.task-focus-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: flex-end; }
.task-focus-progress { grid-column: 1 / -1; height: 0.45rem; }
.task-focus-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(18rem, 24rem); gap: 1rem; align-items: start; }
.task-focus-main { min-width: 0; }
.task-focus-sidebar { display: flex; flex-direction: column; gap: 0.75rem; position: sticky; top: 1rem; }
.task-sidebar-card, .task-sidebar-section { border: 1px solid #dbe3ef; border-radius: 1rem; background: #ffffff; padding: 0.85rem; }
.task-sidebar-card-dark, .task-sidebar-section-dark { border-color: #233048; background: linear-gradient(135deg, #101a2d 0%, #0f1726 100%); }
.task-sidebar-title { color: #0f172a; font-size: 0.82rem; font-weight: 950; }
.task-sidebar-section-dark .task-sidebar-title, .task-sidebar-card-dark .task-sidebar-title { color: #f8fafc; }
.task-sidebar-subtitle { color: #64748b; font-size: 0.72rem; font-weight: 750; margin-top: 0.15rem; }
.task-sidebar-section-dark .task-sidebar-subtitle, .task-sidebar-card-dark .task-sidebar-subtitle { color: #7f93b3; }
.task-sidebar-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; text-align: left; }
.task-sidebar-chevron { width: 1.45rem; height: 1.45rem; display: inline-flex; align-items: center; justify-content: center; border-radius: 9999px; background: #f1f5f9; color: #0f172a; font-weight: 950; }
.task-sidebar-section-dark .task-sidebar-chevron { background: #16243f; color: #dbeafe; }
.task-sidebar-body { margin-top: 0.75rem; }
.task-missing-list-compact { margin-top: 0; }
.task-missing-item-compact { grid-template-columns: 1fr auto; padding: 0.55rem; }
.task-template-list-compact { grid-template-columns: 1fr; }
.task-done-card { color: #86efac; font-size: 0.78rem; font-weight: 850; padding: 0.7rem; border-radius: 0.8rem; background: rgba(18,53,36,0.35); border: 1px solid #1f6f4a; }
@media (max-width: 1100px) { .task-focus-hero { grid-template-columns: 1fr; } .task-focus-actions { justify-content: flex-start; } .task-focus-grid { grid-template-columns: 1fr; } .task-focus-sidebar { position: static; } }
@media (max-width: 900px) { .task-v2-grid { grid-template-columns: 1fr; } }
@media (max-width: 760px) { .task-week-mini { grid-template-columns: repeat(2, 1fr); } }


@media (max-width: 760px) {
  .task-hero { grid-template-columns: 1fr; }
  .task-slot { grid-template-columns: 1fr; }
  .task-agenda-row, .task-missing-item { grid-template-columns: 1fr; }
}


.task-agenda {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.task-agenda-row {
  display: grid;
  grid-template-columns: 7.5rem 1fr auto;
  gap: 0.85rem;
  align-items: stretch;
  padding: 0.75rem 0.85rem;
  border-top: 1px solid rgba(35,48,72,0.65);
}
.task-agenda-row:first-child { border-top: 0; }
.task-agenda-time {
  color: #c7d3e6;
  font-size: 0.82rem;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
}
.task-agenda-duration {
  display: inline-flex;
  margin-top: 0.35rem;
  padding: 0.18rem 0.42rem;
  border-radius: 9999px;
  border: 1px solid #2a3a56;
  color: #7f93b3;
  font-size: 0.68rem;
  font-weight: 800;
}
.task-agenda-card {
  border-left: 5px solid #A78BFA;

  background: linear-gradient(135deg, #0f1726 0%, #14213a 100%);
  box-shadow: inset 0 0 0 1px rgba(125,211,252,0.08);
  padding: 0.75rem 0.85rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.4rem;
}
.task-agenda-empty {
  border: 1px dashed #2a3a56;
  border-radius: 0.9rem;
  padding: 0.65rem 0.85rem;
  color: #7f93b3;
  background: rgba(15,23,38,0.45);
  display: flex;
  align-items: center;
  font-size: 0.78rem;
  font-weight: 800;
}
.task-agenda-card-marketing { border-left-color: #0EA5E9; }
.task-agenda-card-design { border-left-color: #F2A93B; }
.task-agenda-card-reuniao { border-left-color: #A78BFA; }
.task-agenda-card-sistemas { border-left-color: #34D399; }
.task-agenda-card-admin { border-left-color: #F87171; }
.task-agenda-card-cliente { border-left-color: #38BDF8; }
.task-agenda-card-oficina { border-left-color: #FB923C; }
.task-agenda-card-pausa { border-left-color: #FACC15; }
.task-agenda-card-almoco { border-left-color: #FBBF24; }
.task-agenda-card-outro { border-left-color: #94A3B8; }

  min-height: 100vh;

  align-items: center;
  justify-content: center;

    radial-gradient(circle at top left, rgba(14,165,233,0.18), transparent 32rem),

.password-card {

  flex-direction: column;
  gap: 0.85rem;

.password-submit { width: 100%; }
